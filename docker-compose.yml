version: "3.8"

# Cradle Multi-Agent Swarm
# Start all agents: docker compose up -d
# View logs: docker compose logs -f

services:
  cradle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cradle
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

